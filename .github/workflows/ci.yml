name: AquaVision CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aquavision
          POSTGRES_PASSWORD: aquavision
          POSTGRES_DB: aquavision_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping" --health-interval 10s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: aquavision
        run: pip install -r api/requirements.txt

      - name: Run linting
        working-directory: aquavision
        run: |
          pip install ruff
          ruff check api/ agents/ worker/ --ignore E501,E402

      - name: Run tests
        working-directory: aquavision
        env:
          DATABASE_URL: postgresql+asyncpg://aquavision:aquavision@localhost:5432/aquavision_test
          DATABASE_SYNC_URL: postgresql://aquavision:aquavision@localhost:5432/aquavision_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET_KEY: test-jwt-secret
          SECRET_KEY: test-secret-key
          S3_ENDPOINT: localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
        run: |
          pytest tests/ -v --cov=api --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: aquavision/coverage.xml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: aquavision/frontend/package.json

      - name: Install deps
        working-directory: aquavision/frontend
        run: npm ci --legacy-peer-deps

      - name: Type check
        working-directory: aquavision/frontend
        run: npm run type-check

      - name: Lint
        working-directory: aquavision/frontend
        run: npm run lint

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: aquavision
          file: aquavision/infrastructure/docker/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: aquavision
          file: aquavision/infrastructure/docker/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: aquavision
          file: aquavision/infrastructure/docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
